<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプト構成大全｜閲覧ビューア</title>
<style>
  :root{
    --ink:#0c0e13; --lime:#a8e000; --lime-bright:#c8f53a; --violet:#6d5cff;
    --bar:#14171e; --sub:#9da4b3;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;
    background:#1a1d24; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* トップバー */
  .topbar{
    background:var(--bar); border-bottom:1px solid #262b35;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; gap:12px; flex-shrink:0; z-index:10;
  }
  .topbar .left{ display:flex; align-items:center; gap:12px; min-width:0; }
  .back{ color:#cfd4e0; font-size:13px; font-weight:700; white-space:nowrap; }
  .back:hover{ color:#fff; }
  .title{ font-size:13px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .title .lime{ color:var(--lime-bright); }
  .topbar .right{ display:flex; align-items:center; gap:8px; }
  .dlbtn{
    background:var(--lime); color:var(--ink); border:none; border-radius:8px;
    padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; text-decoration:none;
  }
  .dlbtn:hover{ opacity:0.88; }

  /* ステージ */
  .stage{
    flex:1; position:relative; overflow:auto;
    display:flex; align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(circle at 50% 30%,#22262f,#15171d 70%);
  }
  #pageCanvas{
    max-width:100%; max-height:100%;
    box-shadow:0 12px 50px rgba(0,0,0,0.6); border-radius:4px; background:#fff;
    display:block;
  }
  .loading{ position:absolute; color:var(--sub); font-size:14px; }
  .spinner{
    width:34px; height:34px; border:3px solid rgba(255,255,255,0.15); border-top-color:var(--lime);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* めくりナビ（左右タップゾーン） */
  .nav-zone{ position:absolute; top:0; bottom:0; width:22%; cursor:pointer; z-index:5; display:flex; align-items:center; }
  .nav-zone.prev{ left:0; justify-content:flex-start; padding-left:10px; }
  .nav-zone.next{ right:0; justify-content:flex-end; padding-right:10px; }
  .nav-arrow{
    width:46px; height:46px; border-radius:50%; background:rgba(20,23,30,0.7);
    border:1px solid rgba(255,255,255,0.18); color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s;
  }
  .nav-zone:hover .nav-arrow{ opacity:1; }
  .nav-zone.disabled{ cursor:default; }
  .nav-zone.disabled .nav-arrow{ opacity:0!important; }

  /* ボトムバー */
  .bottombar{
    background:var(--bar); border-top:1px solid #262b35; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; gap:16px; padding:10px 16px;
  }
  .navbtn{
    background:#262b35; color:#fff; border:none; border-radius:8px; width:40px; height:38px;
    font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .navbtn:hover:not(:disabled){ background:#333a47; }
  .navbtn:disabled{ opacity:0.35; cursor:default; }
  .pageinfo{ font-size:13px; color:#cfd4e0; min-width:90px; text-align:center; }
  .pageinfo input{
    width:46px; background:#262b35; border:1px solid #3a4150; color:#fff; border-radius:6px;
    text-align:center; font-size:13px; padding:5px; font-family:inherit;
  }
  .zoombtn{ background:#262b35; color:#fff; border:none; border-radius:8px; width:38px; height:38px; font-size:15px; cursor:pointer; }
  .zoombtn:hover{ background:#333a47; }

  @media(max-width:600px){
    .title{ max-width:140px; }
    .nav-zone{ width:30%; }
    .zoomgroup{ display:none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="left">
    <a class="back" href="index.html">‹ 特典一覧</a>
    <span class="title">3大AI特化 <span class="lime">プロンプト構成大全</span></span>
  </div>
  <div class="right">
    <a class="dlbtn" href="prompt-daizen-60p.pdf" download>⬇ ダウンロード</a>
  </div>
</div>

<div class="stage" id="stage">
  <div class="loading" id="loading"><div class="spinner"></div>読み込み中…</div>
  <canvas id="pageCanvas"></canvas>
  <div class="nav-zone prev" id="zonePrev"><div class="nav-arrow">‹</div></div>
  <div class="nav-zone next" id="zoneNext"><div class="nav-arrow">›</div></div>
</div>

<div class="bottombar">
  <button class="navbtn" id="firstBtn" title="最初へ">«</button>
  <button class="navbtn" id="prevBtn" title="前へ">‹</button>
  <div class="pageinfo"><input type="number" id="pageNum" min="1" value="1"> / <span id="pageCount">–</span></div>
  <button class="navbtn" id="nextBtn" title="次へ">›</button>
  <button class="navbtn" id="lastBtn" title="最後へ">»</button>
  <span class="zoomgroup" style="display:inline-flex; gap:8px; margin-left:8px;">
    <button class="zoombtn" id="zoomOut" title="縮小">−</button>
    <button class="zoombtn" id="zoomIn" title="拡大">＋</button>
  </span>
</div>

<script src="pdf.min.js"></script>
<script>
  const PDF_URL = "prompt-daizen-60p.pdf";
  pdfjsLib.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js";

  let pdfDoc=null, pageNum=1, rendering=false, pending=null, zoom=1.0;
  const canvas=document.getElementById('pageCanvas');
  const ctx=canvas.getContext('2d');
  const loading=document.getElementById('loading');

  function renderPage(num){
    rendering=true;
    pdfDoc.getPage(num).then(page=>{
      const stage=document.getElementById('stage');
      // ステージに収まる基準スケールを算出
      const vp1=page.getViewport({scale:1});
      const availW=stage.clientWidth-40, availH=stage.clientHeight-40;
      const fit=Math.min(availW/vp1.width, availH/vp1.height);
      const scale=fit*zoom*(window.devicePixelRatio||1);
      const vp=page.getViewport({scale:scale});
      canvas.width=vp.width; canvas.height=vp.height;
      canvas.style.width=(vp.width/(window.devicePixelRatio||1))+'px';
      canvas.style.height=(vp.height/(window.devicePixelRatio||1))+'px';
      const task=page.render({canvasContext:ctx, viewport:vp});
      task.promise.then(()=>{
        rendering=false; loading.style.display='none';
        if(pending!==null){ const p=pending; pending=null; renderPage(p); }
      });
    });
    document.getElementById('pageNum').value=num;
    updateNav();
  }
  function queueRender(num){ if(rendering) pending=num; else renderPage(num); }
  function updateNav(){
    document.getElementById('prevBtn').disabled = pageNum<=1;
    document.getElementById('firstBtn').disabled = pageNum<=1;
    document.getElementById('nextBtn').disabled = pageNum>=pdfDoc.numPages;
    document.getElementById('lastBtn').disabled = pageNum>=pdfDoc.numPages;
    document.getElementById('zonePrev').classList.toggle('disabled', pageNum<=1);
    document.getElementById('zoneNext').classList.toggle('disabled', pageNum>=pdfDoc.numPages);
  }
  function go(n){ if(!pdfDoc) return; if(n<1||n>pdfDoc.numPages) return; pageNum=n; queueRender(pageNum); }

  pdfjsLib.getDocument(PDF_URL).promise.then(doc=>{
    pdfDoc=doc;
    document.getElementById('pageCount').textContent=doc.numPages;
    document.getElementById('pageNum').max=doc.numPages;
    renderPage(pageNum);
  }).catch(err=>{
    loading.innerHTML='読み込みに失敗しました。<br>ダウンロードしてご覧ください。';
    console.error(err);
  });

  // 操作
  document.getElementById('prevBtn').onclick=()=>go(pageNum-1);
  document.getElementById('nextBtn').onclick=()=>go(pageNum+1);
  document.getElementById('firstBtn').onclick=()=>go(1);
  document.getElementById('lastBtn').onclick=()=>go(pdfDoc.numPages);
  document.getElementById('zonePrev').onclick=()=>go(pageNum-1);
  document.getElementById('zoneNext').onclick=()=>go(pageNum+1);
  document.getElementById('pageNum').onchange=(e)=>go(parseInt(e.target.value)||1);
  document.getElementById('zoomIn').onclick=()=>{ zoom=Math.min(zoom+0.25,3); queueRender(pageNum); };
  document.getElementById('zoomOut').onclick=()=>{ zoom=Math.max(zoom-0.25,0.5); queueRender(pageNum); };

  // キーボード
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { go(pageNum+1); e.preventDefault(); }
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') { go(pageNum-1); e.preventDefault(); }
    if(e.key==='Home') go(1);
    if(e.key==='End') go(pdfDoc.numPages);
  });
  // スワイプ
  let tsx=null;
  document.getElementById('stage').addEventListener('touchstart',e=>{ tsx=e.changedTouches[0].clientX; },{passive:true});
  document.getElementById('stage').addEventListener('touchend',e=>{
    if(tsx===null) return; const dx=e.changedTouches[0].clientX-tsx;
    if(Math.abs(dx)>50){ if(dx<0) go(pageNum+1); else go(pageNum-1); } tsx=null;
  },{passive:true});
  // リサイズ時に再描画
  let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ if(pdfDoc) queueRender(pageNum); },200); });
</script>
</body>
</html>
