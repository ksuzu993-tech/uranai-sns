<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS｜AI実践シリーズ</title>
<meta name="description" content="AI実践シリーズの公式SNS。Instagram・Xで最新の発信をチェックできます。">
<style>
  :root{
    --ink:#0c0e13; --ink2:#14171e; --line:#262b35;
    --sub:#9da4b3; --lime:#a8e000; --lime-bright:#c8f53a; --violet:#6d5cff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;
    background:linear-gradient(165deg,#14171e 0%,#0c0e13 55%,#070809 100%);
    color:#fff; min-height:100vh; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center;
    padding:48px 20px; position:relative; overflow-x:hidden;
  }
  body::before{
    content:""; position:absolute; width:420px; height:420px; border-radius:50%;
    background:radial-gradient(circle,rgba(124,108,255,0.28),transparent 70%);
    top:-140px; right:-120px; pointer-events:none;
  }
  body::after{
    content:""; position:absolute; width:360px; height:360px; border-radius:50%;
    background:radial-gradient(circle,rgba(168,224,0,0.14),transparent 70%);
    bottom:-150px; left:-130px; pointer-events:none;
  }
  .card{
    position:relative; z-index:2; width:100%; max-width:440px; text-align:center;
  }
  /* プロフィール */
  .avatar{
    width:96px; height:96px; border-radius:28px; margin:0 auto 20px;
    background:linear-gradient(150deg,#241b4d,#3a1d4d); border:1px solid rgba(255,255,255,0.12);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 36px rgba(0,0,0,0.4);
  }
  .avatar .mk{ font-size:38px; font-weight:900; background:linear-gradient(120deg,#a78bfa,#c8f53a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .eyebrow{
    display:inline-block; font-size:11px; font-weight:700; letter-spacing:0.2em;
    color:var(--lime-bright); border:1px solid rgba(200,245,58,0.4);
    padding:5px 14px; border-radius:30px; margin-bottom:16px;
  }
  h1{ font-size:24px; font-weight:900; line-height:1.4; margin-bottom:10px; }
  h1 .lime{ color:var(--lime-bright); }
  .bio{ font-size:14px; color:#cfd4e0; line-height:1.85; margin-bottom:32px; }

  /* SNSリンク（縦並び大ボタン） */
  .links{ display:flex; flex-direction:column; gap:14px; }
  .link{
    display:flex; align-items:center; gap:16px; text-decoration:none;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
    border-radius:16px; padding:16px 20px; color:#fff;
    transition:transform .15s, background .2s, border-color .2s; position:relative;
  }
  .link:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.09); }
  .link .ic{
    width:48px; height:48px; border-radius:13px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .link .ic svg{ width:26px; height:26px; }
  .link.instagram .ic{ background:linear-gradient(95deg,#f58529,#dd2a7b 45%,#8134af 75%,#515bd4); }
  .link.x .ic{ background:#000; border:1px solid #2a2f3a; }
  .link .txt{ text-align:left; flex:1; }
  .link .txt .name{ font-size:16px; font-weight:800; }
  .link .txt .handle{ font-size:12.5px; color:var(--sub); margin-top:2px; }
  .link .arrow{ color:var(--sub); font-size:20px; flex-shrink:0; }

  /* 準備中（X） */
  .link.soon{ cursor:default; opacity:0.7; }
  .link.soon:hover{ transform:none; background:rgba(255,255,255,0.05); }
  .link.soon .ic{ background:#1a1d24; border:1px dashed #3a4150; }
  .badge-soon{
    background:var(--lime); color:var(--ink); font-size:10px; font-weight:800;
    padding:3px 9px; border-radius:11px; flex-shrink:0;
  }

  /* DM CTA */
  .dm-btn{
    display:flex; align-items:center; justify-content:center; gap:9px; text-decoration:none;
    margin-top:14px;
    background:linear-gradient(95deg,#f58529,#dd2a7b 45%,#8134af 75%,#515bd4);
    color:#fff; font-size:15px; font-weight:800; padding:16px; border-radius:16px;
    box-shadow:0 10px 30px rgba(221,42,123,0.35); transition:transform .15s;
  }
  .dm-btn:hover{ transform:translateY(-2px); }
  .dm-btn svg{ width:22px; height:22px; }

  footer{ margin-top:36px; font-size:11.5px; color:#6b7280; text-align:center; }
  footer .brand{ color:#cfd4e0; font-weight:800; font-size:13px; }
  footer .brand .lime{ color:var(--lime-bright); }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar"><span class="mk">AI</span></div>
    <span class="eyebrow">OFFICIAL SNS</span>
    <h1>AI実践<span class="lime">シリーズ</span></h1>
    <p class="bio">AIをもっとうまく使いこなすための情報を発信しています。<br>各SNSをフォローして、最新の発信をチェックしてください。</p>

    <div class="links">
      <!-- Instagram -->
      <a class="link instagram" href="https://www.instagram.com/suzukidesu993/" target="_blank" rel="noopener">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="6" stroke="#fff" stroke-width="2"/>
            <circle cx="12" cy="12" r="4.5" stroke="#fff" stroke-width="2"/>
            <circle cx="17.5" cy="6.5" r="1.4" fill="#fff"/>
          </svg>
        </span>
        <span class="txt">
          <span class="name">Instagram</span>
          <span class="handle">@suzukidesu993</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <!-- X（準備中） -->
      <span class="link x soon">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4l16 16M20 4L4 20" stroke="#6b7280" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="txt">
          <span class="name">X（旧Twitter）</span>
          <span class="handle">近日公開予定</span>
        </span>
        <span class="badge-soon">準備中</span>
      </span>
    </div>

    <!-- DM CTA -->
    <a class="dm-btn" href="https://ig.me/m/suzukidesu993" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="#fff" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.5" stroke="#fff" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1.4" fill="#fff"/>
      </svg>
      InstagramのDMで問い合わせる
    </a>

    <footer>
      <div class="brand">AI実践<span class="lime">シリーズ</span></div>
      <p style="margin-top:6px;">フォロー・ご連絡お待ちしています。</p>
    </footer>
  </div>
</body>
</html>
